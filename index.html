<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Voting App</title>
</head>
<body>
    
    <h1>Voting App</h1>

<div class="container">

<h2>Vote Your Favorite</h2>

<button onclick="vote('A')">A</button>
<button onclick="vote('B')">B</button>
<button onclick="vote('C')">C</button>

<h3>Results</h3>

<p>A: <span id="A">0</span></p>
<p>B: <span id="B">0</span></p>
<p>C: <span id="C">0</span></p>

<h3>Current Winner</h3>
<p id="winner">No votes yet</p>

<button  onclick="clearVotes()" class="clear-btn">Clear Results</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="script.js"></script>

</body>
</html>
